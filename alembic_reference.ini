# Alembic config for the multi-jurisdiction reference DB.
#
# Different DB, different role, different migration history. Run with:
#
#     alembic -c alembic_reference.ini upgrade head
#
# The actual URL is read from REFERENCE_MIGRATION_DATABASE_URL inside
# alembic_reference/env.py — do NOT set sqlalchemy.url here.
[alembic]
script_location = alembic_reference
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
