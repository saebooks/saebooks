{% extends "base.html" %}
{% block title %}Edit {{ account.code }} — SAE Books{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Edit account <span class="dim">{{ account.code }}</span></h1>
  <div class="meta">{{ company_name }}</div>
</div>

<form method="post" action="/accounts/{{ account.id }}" class="tc-form">
  <label>Code <input name="code" required maxlength="32" value="{{ account.code }}"></label>
  <label>Name <input name="name" required value="{{ account.name }}"></label>
  <label>Type
    <select name="account_type">
      {% for v, l in account_types %}
      <option value="{{ v }}" {% if v == account.account_type.value %}selected{% endif %}>{{ l }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Reconcile
    <select name="reconcile">
      <option value="false" {% if not account.reconcile %}selected{% endif %}>No</option>
      <option value="true" {% if account.reconcile %}selected{% endif %}>Yes</option>
    </select>
  </label>
  <label>Header
    <select name="is_header">
      <option value="false" {% if not account.is_header %}selected{% endif %}>No</option>
      <option value="true" {% if account.is_header %}selected{% endif %}>Yes</option>
    </select>
  </label>
  <label>Default tax code <input name="tax_code_default" maxlength="16" value="{{ account.tax_code_default or '' }}"></label>
  <div class="form-actions">
    <button type="submit">Save</button>
    <a href="/accounts">Cancel</a>
  </div>
</form>
{% endblock %}
