# Estonian fringe benefits (erisoodustus) as benefit-in-kind rates
# (M1.5 · T11, EE seed). EST is employer_taxed (same incidence as AU
# FBT) — the employer pays the tax on the benefit's value, not the
# employee. Declared monthly on TSD Annex 4 (Lisa 4), due together with
# payment by the 10th of the following month (unlike AU's April-March
# FBT year — EE fringe benefits are a MONTHLY filing period, reflected
# below as filing_period_start_month=1 / end_month=12).
#
# COMPOUND-TAX SCHEMA LIMITATION (flag, not fixed here — seed data only):
# EE fringe benefits carry TWO taxes, not one flat rate:
#
#   income_tax = taxable_value * 22 / 78        (the SAME 22/78 gross-up
#                                                  as corporate_tax_rates.yaml)
#   social_tax = (taxable_value + income_tax) * 0.33
#
# BenefitInKindRate.rate_percent is a single Numeric field ("Rate as a
# percentage ... applied to the valued benefit") — it cannot represent
# this two-tax, gross-up-then-33%-on-top compound formula. rate_percent
# below is seeded as 22.0000 (the income-tax leg's 22/78 numerator, same
# convention as corporate_tax_rates.yaml) with the full formula spelled
# out in this comment; a consuming service must NOT compute
# taxable_value * rate_percent / 100 as the total liability — that would
# capture neither the gross-up nor the social-tax leg. Flagged in the
# final report as a genuine schema limitation (a single rate_percent
# field understates a compound two-tax mechanic), not implemented here.
#
# Company-car benefit (EUR 1.96/kW/month standard, EUR 1.47/kW/month for
# cars over 5 years old) — GAP CLOSED (M1.5 · T11 fringe-benefit compute,
# Packet 2): ``0012_bik_amount_per_unit`` added ``rate_amount_per_unit``/
# ``rate_unit`` (amount-shaped, not percentage-shaped) columns precisely
# for this case, so the two rows below now carry it directly instead of
# being skipped. rate_percent is still populated (22.0000, same
# convention as the ``general`` row) for schema consistency, but
# ``services.fringe_benefits_ee`` does NOT read it for these two rows —
# it reads ``rate_amount_per_unit`` and applies the SAME 22/78 + 33%
# compound formula as ``general`` (via ``services.payroll_ee``'s shared
# income_tax_rate_percent/social_tax_rate_percent — the two-tax
# mechanic is one engine-wide EE fact, not car-specific).
#
# Verified directly against EMTA (WebFetch/WebSearch, 2026-07-11):
# https://www.emta.ee/en/business-client/taxes-and-payment/income-and-
# social-taxes/fringe-benefits — "fringe benefits provided by the
# employer to the employee are subject to income tax at a rate of 22/78
# and social tax at a rate of 33%" (confirms the compound formula above)
# and "[the price] is 1.96 euros a month per engine power unit (kW) ...
# In the event of an automobile older than five years, the price ... is
# 1.47 euros per engine power unit (kW)" (confirms both rates and the
# ">5 years" boundary — a car exactly 5 years old still uses the
# standard 1.96 rate, only STRICTLY older than 5 years drops to 1.47).
# The worked example on the same page (960 taxable value -> income tax
# 270.77, social tax 406.15) is used as this packet's formula golden
# (tests/services/test_fringe_benefits_ee.py) — it also fixes the
# rounding ORDER: income tax is rounded to 2dp BEFORE being added into
# the social-tax base, not computed from the unrounded figure.
table: benefit_in_kind_rates
key: [jurisdiction, benefit_category, effective_from]
rows:
  - jurisdiction: EST
    benefit_category: general
    incidence: employer_taxed
    valuation_method: cost_basis
    rate_percent: 22.0000
    filing_period_start_month: 1
    filing_period_end_month: 12
    effective_from: 2025-01-01
  - jurisdiction: EST
    benefit_category: motor_vehicle
    incidence: employer_taxed
    valuation_method: amount_per_unit
    rate_percent: 22.0000
    rate_amount_per_unit: 1.9600
    rate_unit: eur_per_kw_per_month
    filing_period_start_month: 1
    filing_period_end_month: 12
    effective_from: 2025-01-01
  - jurisdiction: EST
    benefit_category: motor_vehicle_aged
    incidence: employer_taxed
    valuation_method: amount_per_unit
    rate_percent: 22.0000
    rate_amount_per_unit: 1.4700
    rate_unit: eur_per_kw_per_month
    filing_period_start_month: 1
    filing_period_end_month: 12
    effective_from: 2025-01-01
