# EE recommended chart of accounts — used at company creation.
#
# NOT a state mandate — Estonia has NO mandated chart of accounts for
# private companies (Raamatupidamise seadus / Accounting Act §8(1) only
# requires each entity to prepare its own kontoplaan; a mandated
# kontoplaan exists solely for public-sector entities via the Riigi
# raamatupidamise üldeeskiri). This template follows the de-facto SME
# numbering convention used across mainstream Estonian accounting
# software (Merit Aktiva, SimplBooks) and general reference material:
# 1xxx Vara (Assets), 2xxx Kohustised (Liabilities), 3xxx Omakapital
# (Equity), 4xxx Tulud (Revenue), 5xxx-6xxx Kulud (Expenses) — a
# convenience default a company may freely deviate from.
#
# Tax-code defaults reference the codes seeded in tax_codes.yaml.
# Names given as "Estonian (English)".
