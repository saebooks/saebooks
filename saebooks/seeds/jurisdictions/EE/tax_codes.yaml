# Estonian käibemaks (VAT) reference tax codes — feeds KMD box aggregation
# (see tax_return_box_definitions.yaml in this directory) and
# chart_template.yaml's default_tax_code assignments.
#
# Rate history (KMS §15, primary source: emta.ee vorm_kmd_2025_07.pdf +
# EMTA VAT-rates page, fetched 2026-07):
#   20%  until 2023-12-31  (legacy)
#   22%  2024-01-01 – 2025-06-30  (legacy)
#   24%  from 2025-07-01  (current standard rate — EMTA describes this as
#        the ongoing standard rate; no sunset date stated)
#   13%  from 2025-01-01  (new reduced rate — accommodation, up from 9%)
#    9%  reduced rate — books/workbooks (not e-books), periodicals/press
#        (raised from 5% to 9% on 2025-01-01), medicines, contraceptives,
#        hygiene products, medical devices
#    5%  legacy reduced rate for press, superseded 2025-01-01
#    0%  intra-Community goods supply, exports, international transport,
#        certain cross-border B2B services (KMS §15(3)-(4))
#
# Same "code" reused across dated rows for a rate that changed over time
# (mirrors AU's mandatory_contribution_rules.yaml au_super_guarantee
# pattern) — the natural key is (jurisdiction, code, effective_from).
#
# UNVERIFIED DATES: the supplied research confirmed rate *values* and the
# *end* dates of superseded rates (e.g. "20% until 2023-12-31") but did
# not confirm the historical *start* dates of the 20%, 5%, and 0%-rate
# regimes, nor the exemption/reverse-charge regimes' commencement. Rather
# than omit these long-standing codes, each is seeded with a placeholder
# effective_from of 1991-01-01 (Estonia's post-independence baseline, used
# here purely as an explicit "not the real date" sentinel, not a sourced
# fact) and flagged '# UNVERIFIED' — do not rely on these placeholder
# dates for pre-2024 history without independent verification.
#
# OSS/IOSS: represented as supply-classification marker codes (OSS_EU,
# IOSS_IMPORT) with rate_percent=0.0000 because the actual VAT under
# these EU-wide simplification schemes is assessed at the DESTINATION
# member state's rate and reported via the quarterly Union OSS / monthly
# IOSS return (return_type 'OSS-Q' — see tax_return_box_definitions.yaml,
# seeded there as a deliberate stub only), not at an Estonian domestic
# rate. These two codes exist so a company's chart/tax-code UI can flag a
# supply as OSS/IOSS-reportable; they are not a rate to apply.
table: tax_codes
key: [jurisdiction, code, effective_from]
rows:
  # --- Standard rate (dated series) -----------------------------------
  - jurisdiction: EST
    code: STD
    name: "Käibemaks — üldine määr (20%, legacy)"
    rate_percent: 20.0000
    direction: sale
    is_inclusive: false
    reverse_charge: false
    tax_family: vat_gst
    gl_account_hint: "Käibemaks (VAT) Payable"
    effective_from: 1991-01-01  # UNVERIFIED — placeholder; only the 2023-12-31 end date is confirmed by research.
    effective_to: 2023-12-31
    report_box_keys: ["KMD:1-1"]

  - jurisdiction: EST
