# Estonian käibemaks (VAT) reference tax codes — feeds KMD box aggregation
# (see tax_return_box_definitions.yaml in this directory) and
# chart_template.yaml's default_tax_code assignments.
#
# Rate history (KMS §15, primary source: emta.ee vorm_kmd_2025_07.pdf +
# EMTA VAT-rates page, fetched 2026-07):
#   20%  until 2023-12-31  (legacy)
#   22%  2024-01-01 – 2025-06-30  (legacy)
#   24%  from 2025-07-01  (current standard rate — EMTA describes this as
#        the ongoing standard rate; no sunset date stated)
#   13%  from 2025-01-01  (new reduced rate — accommodation, up from 9%)
#    9%  reduced rate — books/workbooks (not e-books), periodicals/press
#        (raised from 5% to 9% on 2025-01-01), medicines, contraceptives,
#        hygiene products, medical devices
#    5%  legacy reduced rate for press, superseded 2025-01-01
#    0%  intra-Community goods supply, exports, international transport,
#        certain cross-border B2B services (KMS §15(3)-(4))
#
# Same "code" reused across dated rows for a rate that changed over time
# (mirrors AU's mandatory_contribution_rules.yaml au_super_guarantee
# pattern) — the natural key is (jurisdiction, code, effective_from).
#
# KMD-formula support Packet 2 (see
# ~/.claude/plans/kmd-formula-support-scope.md §2/§7) — company-side
# TaxCode.reporting_type convention this seed's box definitions
# (tax_return_box_definitions.yaml) key their feeder_tax_codes off:
#   standard / standard_legacy_20 / standard_legacy_22 / reduced_13 /
#   reduced_9 / reduced_5_legacy / exempt / capital (unchanged from
#   Packet 1) PLUS, as of Packet 2:
#   zero_ic_goods / zero_ic_services / zero_export / zero_traveller
#     — the old single "zero_rated" tag, split into the four KMD box-3.1/
#       3.1.1/3.2/3.2.1 sub-total leaves (see the split ZERO_* rows
#       below). Box 3 itself feeds off the union of all four.
#   input_import
#     — new leaf feeding KMD box 5.1 (see the new INPUT_IMPORT row
#       below).
# Not yet added (deferred — see tax_return_box_definitions.yaml's box
# 5.3/5.4 comments): input_car_100 / input_car_50.
#
# KMD-formula support Packet 3 (RC-FANOUT, scope §3.4) landed the
# prerequisite this file used to flag as missing: the EE posting
# dispatcher (services.journal._apply_tax_treatment now resolves
# Company.jurisdiction instead of hardcoding AU; services.tax_engine.ee
# .EETaxEngine is the real, no-longer-stub EE engine). Two of the
# reporting_type tags below are now GENUINELY POSTABLE and produce a
# two-component (output + input) fan-out via that engine:
#   rc_eu_acq_goods / rc_eu_acq_services
#     — company-side TaxCode rows with these reporting_type values now
#       post as EU-acquisition reverse charge: one line yields BOTH an
#       output-role component (KMD box 1, via tax_return_box_definitions
#       .yaml's new "1_RC" role-based ledger box) and an input-role
#       component (KMD box 5, via "5_RC") — see EETaxEngine's own
#       docstring for the two-component design and this packet's scope
#       narrowing (current standard rate 24% only; full deduction only).
# The remaining tags this header previously flagged as "not yet
# postable" are STILL not fanned out by any engine (single-component,
# informative-box-only, unchanged from Packet 2):
#   ic_acq_exempt / rc_domestic_acq / ee_acq_foreign / rc_domestic_supply /
#   install_other_ms
# — these feed KMD box 6/6.1/7/7.1/9 (informative/seller-side boxes)
# through the ordinary account-type bucket, which has never required a
# posting dispatcher or multi-component fan-out; they were already
# postable in the sense that any company-side TaxCode with one of these
# reporting_type values would aggregate correctly, just via the plain
# single-component path every engine (including the pre-Packet-3
# AU-hardcoded dispatcher) already supported.
#
# UNVERIFIED DATES: the supplied research confirmed rate *values* and the
# *end* dates of superseded rates (e.g. "20% until 2023-12-31") but did
# not confirm the historical *start* dates of the 20%, 5%, and 0%-rate
# regimes, nor the exemption/reverse-charge regimes' commencement. Rather
# than omit these long-standing codes, each is seeded with a placeholder
# effective_from of 1991-01-01 (Estonia's post-independence baseline, used
# here purely as an explicit "not the real date" sentinel, not a sourced
# fact) and flagged '# UNVERIFIED' — do not rely on these placeholder
# dates for pre-2024 history without independent verification.
#
# OSS/IOSS: represented as supply-classification marker codes (OSS_EU,
# IOSS_IMPORT) with rate_percent=0.0000 because the actual VAT under
# these EU-wide simplification schemes is assessed at the DESTINATION
# member state's rate and reported via the quarterly Union OSS / monthly
# IOSS return (return_type 'OSS-Q' — see tax_return_box_definitions.yaml,
# seeded there as a deliberate stub only), not at an Estonian domestic
# rate. These two codes exist so a company's chart/tax-code UI can flag a
# supply as OSS/IOSS-reportable; they are not a rate to apply.
#
# ⚠ CRITIC-ROUND-3 FINDING (stated, not silently buried — surfaced per
# scope §3.4's own bar): this reference catalog (RefTaxCode,
# ``saebooks/models/reference/tax_code.py``) has NO ``reporting_type``
# column at all — the field the *company-side* ``TaxCode`` model uses,
# and the exact field ``tax_return_box_definitions.yaml``'s
# ``feeder_tax_codes`` key their aggregation off. A company provisioning
# its own tax codes by copying rows from this file has no seed-supplied
# way to learn which ``reporting_type`` string to set — this file only
# carries ``report_box_keys`` (an informational KMD-box hint, a SEPARATE
# mechanism, read by nothing in the engine). Adding a
# ``reporting_type`` column to ``RefTaxCode`` needs a reference-DB
# migration; this build's mandate permits exactly ONE additive
# reference-DB migration (0009, already spent on the ``formula`` column)
# — so that real fix is DEFERRED, not done here. Concretely, until then:
#   * The single ``RC_EU_ACQ`` code (below) covers BOTH
#     ``rc_eu_acq_goods`` and ``rc_eu_acq_services`` — a company must
#     manually pick the correct one of the two company-side
#     ``reporting_type`` tags depending on whether the acquisition is of
#     goods or services; nothing here discriminates them.
#   * ``ic_acq_exempt`` / ``rc_domestic_acq`` / ``ee_acq_foreign`` /
#     ``install_other_ms`` (the tags KMD boxes 6/6.1/7/7.1/9 also read —
#     see ``tax_return_box_definitions.yaml``) have NO backing row in
#     this file at all today.
# Blast radius is limited in practice: there is no automated
# provisioning path from this reference catalog into a company's
# ``TaxCode`` rows today anyway — the live provisioning code
# (``services/tax_codes.py``'s ``INTERNATIONAL_SEED``) is a wholly
# separate, hand-maintained dict with generic "EU" (not EST-specific)
# rows and none of these tags either. So no live pipeline silently files
# a wrong return off this gap; it is a reference-catalog
# completeness/discoverability gap for a FUTURE EE-specific provisioning
# UI, not a currently-exploitable one. Tracked as a follow-up: add
# ``RefTaxCode.reporting_type`` (its own migration) + split ``RC_EU_ACQ``
# into goods/services rows + add rows for the four missing tags.
