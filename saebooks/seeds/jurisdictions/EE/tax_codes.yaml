  # company-side TaxCode.reporting_type tag — a separate mechanism from
  # this file's report_box_keys) does NOT wire reverse-charge codes into
  # boxes 4/5 either here or in AU (BAS:1A feeder_tax_codes is just
  # ["taxable"], BAS:1B is ["taxable","capital"] — no "reverse_charge"
  # tag despite ITS existing) — box-level reverse-charge aggregation via
  # feeder_tax_codes is a deferred, engine-wide gap, not an EE-specific
  # one, and out of scope for this fix.
