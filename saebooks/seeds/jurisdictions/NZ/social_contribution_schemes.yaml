# New Zealand social-contribution schemes — the ACC earner's levy
# (collected inside PAYE) as dated rows.
#
# Source: ~/records/saebooks/nz-market-entry-strategy.md §5.4-§5.5
# (verified against IRD's ACC earner's levy page 2026-07-12).
#
# ACC EMPLOYER levies (Work levy + Working Safer levy) are DELIBERATELY
# NOT SEEDED: they are invoiced directly by ACC off IRD-supplied payroll
# data — not filed or withheld through payroll — and the rate is
# per-industry (Classification Unit), so no single rate_percent row is
# truthful. Module implication (§5.5): track/accrue as an expense
# category; no lodgement artefact. The per-industry CU rate table lives
# in the ACC Levy Guidebook PDF and is PARKED (out of the build brief's
# scope).
