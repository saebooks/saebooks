# NZ recommended chart of accounts — used at company creation.
#
# NOT a state mandate (see statutory_account_frameworks.yaml — NZ has no
# mandated numbering plan; this is a convenience default, freely
# deviated from). Numbering follows the engine's own SME convention
# (1xxx assets, 2xxx liabilities, 3xxx equity, 4xxx income, 5xxx COGS,
# 6xxx expenses), matching the AU template.
#
# IR10 mapping: statutory_framework_code "ir10" +
# statutory_parent_class = the IR10 part the account rolls into
# (income / expenses / current assets / fixed assets / current
# liabilities / equity). statutory_account_code (the per-box IR10 field
# number) is deliberately NULL — the IR10 box numbering was not
# extracted in the research pass and is not invented here (parked; a
# manual IR10 form read fills it in). No mandate claims anywhere.
#
# Tax-code defaults reference the codes seeded in tax_codes.yaml.
