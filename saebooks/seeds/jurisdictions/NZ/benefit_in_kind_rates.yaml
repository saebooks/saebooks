# New Zealand fringe benefit tax (FBT) rates — benefit-in-kind rows.
#
# Source: ~/records/saebooks/nz-market-entry-strategy.md §5.5 (verified
# 2026-07-12): single rate 63.93%; alternate rate 49.25% (quarters 1-3
# with a quarter-4 attributed-rate wash-up). Quarterly filing is the
# default; annual or income-year elections are available where
# PAYE + ESCT <= NZD 1m.
#
# Incidence: employer_taxed (the employer pays FBT on the benefit, same
# incidence family as AU FBT / EE erisoodustus). Filing period is the
# FBT year 1 April - 31 March (start_month=4 / end_month=3).
#
# The single-rate and alternate-rate OPTIONS are seeded as separate
# benefit_category keys ("single_rate" / "alternate_rate") because the
# natural key is (jurisdiction, benefit_category, effective_from) and
# both options are simultaneously in force — an employer ELECTS one.
#
# ⚠ DATED PLACEHOLDER — Budget 2026 motor-vehicle FBT change (§5.5
# watch item): the announced motor-vehicle FBT simplification (six use
# categories, EV discounts) is NOT YET ENACTED — it missed the Budget
# Measures Bill (No 3, assented 5 June 2026) and would apply to benefits
# provided AFTER 1 APRIL 2027 once it becomes law. Today's law is what
# is seeded below. When (if) enacted, add motor-vehicle category rows
# effective 2027-04-01 — do NOT seed them now (unenacted law is not
# reference data).
table: benefit_in_kind_rates
key: [jurisdiction, benefit_category, effective_from]
rows:
  - jurisdiction: NZL
    benefit_category: single_rate
    incidence: employer_taxed
    valuation_method: cost_basis
    rate_percent: 63.9300
    filing_period_start_month: 4
    filing_period_end_month: 3
    effective_from: 2025-04-01
    effective_to: null

  - jurisdiction: NZL
    benefit_category: alternate_rate
    incidence: employer_taxed
    valuation_method: cost_basis
    rate_percent: 49.2500
    filing_period_start_month: 4
    filing_period_end_month: 3
    effective_from: 2025-04-01
    effective_to: null
