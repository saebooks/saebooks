  - jurisdiction: LTU
    code: OUTSIDE_LT
    name: Supplies outside Lithuania / not an LT VAT object (incl. OSS-declared distance sales)
    rate_percent: 0.0000
    direction: sale
    effective_from: 2004-05-01
    report_box_keys: ["FR0600:20"]

  - jurisdiction: LTU
    code: OUT_OF_SCOPE
    name: Outside the scope of PVM (wages, taxes, dividends, non-business)
    rate_percent: 0.0000
    direction: both
    effective_from: 1994-05-01

  - jurisdiction: LTU
    code: RC_DOM_SUPPLY
    name: Art 96 domestic reverse charge — supply (construction works, metal waste/scrap; customer accounts)
    rate_percent: 0.0000
    direction: sale
    effective_from: 2002-07-01
