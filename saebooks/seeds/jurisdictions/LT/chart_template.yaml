  - {jurisdiction: LTU, account_code: "2431", account_name: "VAT receivable (pirkimo PVM)", account_type: ASSET, display_order: 31}
  - {jurisdiction: LTU, account_code: "2900", account_name: "Prepayments and deferred charges", account_type: ASSET, display_order: 32}
  - {jurisdiction: LTU, account_code: "2710", account_name: "Bank current account", account_type: ASSET, display_order: 40}
  - {jurisdiction: LTU, account_code: "2720", account_name: "Cash on hand", account_type: ASSET, display_order: 41}
  # -- class 3: equity ---------------------------------------------------
