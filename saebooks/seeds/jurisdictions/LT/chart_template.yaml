# Lithuania convenience chart of accounts — used at company creation.
#
# NO statutory chart of accounts exists for Lithuanian PRIVATE
# companies (verified 2026-07-12): AVNT (Audito, apskaitos, turto
# vertinimo ir nemokumo valdymo tarnyba, under the Ministry of
# Finance) publishes a RECOMMENDED model chart ("pavyzdinis sąskaitų
# planas", latest revision order No V2-1 of 2025-02-04) that AVNT
# itself states is illustrative and NOT mandatory. (The mandatory
# unified chart applies to PUBLIC-SECTOR entities only — different
# regime, not this file.) This template therefore follows the AVNT
# class conventions (1 non-current assets, 2 current assets, 3 equity,
# 4 liabilities, 5 income, 6 expenses) as a convenience default and
# makes NO statutory-CoA claim — the exact AVNT account numbers were
# not transcribed from the AVNT PDF, so these are AVNT-CLASS-SHAPED
# codes, not AVNT-verbatim codes (stated, not implied).
#
# Tax-code defaults reference the codes seeded in tax_codes.yaml.
# Payroll accounts (6301/6302, 4460/4462/4463) are the accounts
# jurisdictions/lt/__init__.py's PAYROLL_POSTING profile maps the
# neutral payroll roles onto.
table: chart_template
key: [jurisdiction, account_code]
rows:
  # -- class 1/2: assets -------------------------------------------------
  - {jurisdiction: LTU, account_code: "1200", account_name: "Machinery and equipment — at cost", account_type: ASSET, display_order: 10}
  - {jurisdiction: LTU, account_code: "1210", account_name: "Machinery and equipment — accumulated depreciation", account_type: ASSET, display_order: 11}
