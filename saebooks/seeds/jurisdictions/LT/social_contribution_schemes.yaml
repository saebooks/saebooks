    collection_mechanism: payroll_withholding
    effective_from: 2026-01-01

  - jurisdiction: LTU
    code: lt_psd_health_employee
    name: "Sodra PSD — compulsory health insurance (employee, NO ceiling)"
    payer: employee
    rate_percent: 6.9800
    wage_base_floor: null
    wage_base_cap: null
    collection_mechanism: payroll_withholding
    effective_from: 2026-01-01

  # ---- employer --------------------------------------------------------
