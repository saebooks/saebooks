# LV recommended chart of accounts — used at company creation.
#
# NOT a state mandate — no statutory chart of accounts for private
# Latvian companies was verified in this research pass (the Soviet-era /
# 1990s unified kontu plāns regulations are repealed; modern practice
# under the Grāmatvedības likums is entity-defined, as in Estonia). This
# is a CONVENIENCE template following the de-facto Latvian SME numbering
# convention (1xxx ilgtermiņa ieguldījumi / long-term assets, 2xxx
# apgrozāmie līdzekļi / current assets, 3xxx pašu kapitāls / equity,
# 5xxx kreditori / liabilities, 6xxx ieņēmumi / revenue, 7xxx izdevumi /
# expenses) — a company may freely deviate. To keep the engine's chart
# semantics simple this template uses the EE template's 1xxx-6xxx
# layout with Latvian names (the numbering convention claim above is
# therefore NOT reproduced in the codes — no statutory-CoA claim is
# made either way).
#
# Tax-code defaults reference the codes seeded in tax_codes.yaml.
# Names given as "Latvian (English)".
table: chart_template
key: [jurisdiction, account_code]
