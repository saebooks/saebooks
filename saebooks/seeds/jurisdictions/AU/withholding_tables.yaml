# Australian PAYG withholding tables (M1.5 · T7).
# jurisdiction is the 3-char code 'AUS'. This is the jurisdiction-neutral
# canonical table; the AU-named ``payg_withholding_scale`` table it once
# sat alongside was dropped (M1.5 Wave 3a rename sweep — zero consumers,
# unseeded). NOTE: the operative AU withholding path used by live payroll
# is a DIFFERENT model, ``models/payg.py:PaygTaxScale`` (consumed by
# ``jurisdictions/au/payg.py``), which is untouched by this table or the drop —
# see withholding_table.py for the rationale. Coefficients here are a
# small illustrative set, not a full ATO scale-2 tax table.
table: withholding_tables
key: [jurisdiction, code, effective_from]
rows:
  - jurisdiction: AUS
    code: au_payg_scale2
    name: PAYG Withholding Scale 2 — with tax-free threshold
    withholding_type: wage_paye
    formula_type: coefficient
    parameters:
      formula: "withholding = a * gross_weekly - b"
      brackets:
        - lower: 0
          upper: 361.99
          a: 0.0000
          b: 0.00
        - lower: 362.00
          upper: 500.00
          a: 0.1900
          b: 68.34
        - lower: 500.01
          upper: null
          a: 0.3477
          b: 152.62
    effective_from: 2024-07-01
