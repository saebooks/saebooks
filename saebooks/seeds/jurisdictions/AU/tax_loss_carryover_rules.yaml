    carry_back_years: 0
    quarantined_to_basket: false
    effective_from: 1997-07-01
  - jurisdiction: AUS
    taxpayer_type: individual
    loss_basket: capital
    carry_forward_years: null
    carry_back_years: 0
    quarantined_to_basket: true
    effective_from: 1997-07-01
  - jurisdiction: AUS
    taxpayer_type: trust
    loss_basket: revenue
    carry_forward_years: null
    carry_back_years: 0
    quarantined_to_basket: false
    continuity_tests: [fifty_percent_stake, pattern_of_distributions, control, income_injection]
    effective_from: 1997-07-01
  - jurisdiction: AUS
