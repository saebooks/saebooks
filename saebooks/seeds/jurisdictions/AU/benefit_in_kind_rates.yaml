# Australian Fringe Benefits Tax (FBT) as a benefit-in-kind rate (M1.5 · T11).
# AU is employer_taxed (the employer pays FBT on the value of benefits
# provided, not the employee). FBT year runs 1 April - 31 March. See
# ``fbt_rate.py`` / ``fbt_rates`` for the existing detailed AU-shaped
# gross-up-factor table this generalises alongside (additive, not a
# replacement).
table: benefit_in_kind_rates
key: [jurisdiction, benefit_category, effective_from]
rows:
  - jurisdiction: AUS
    benefit_category: general
    incidence: employer_taxed
    valuation_method: statutory_formula
    rate_percent: 47.0000
    filing_period_start_month: 4
    filing_period_end_month: 3
    effective_from: 2017-04-01
