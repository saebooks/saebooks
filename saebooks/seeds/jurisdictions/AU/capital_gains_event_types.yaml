# Australian CGT event catalogue (M1.5 · Wave 5-Income).
# The statutory event types from the summary table in ITAA 1997 s 104-5,
# grouped by the Act's own lettered categories. The catalogue carries no
# effective dating — date-ranged relief mechanics live on
# capital_gains_tax_regimes. Gaps in the lettering (D1A, G2, J3, K-series
# renumberings, L7) are events that were never enacted or have been
# repealed; they are intentionally absent.
