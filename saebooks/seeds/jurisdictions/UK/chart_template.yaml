# UK recommended chart of accounts — used at company creation.
#
# NO statutory chart of accounts exists in the UK (verified — see
# statutory_account_frameworks.yaml). This template is a convenience
# default following the SAGE-CONVENTION nominal-code ranges (0001-9999)
# that UK accountants and bureau software treat as the de-facto
# interchange layer: 00xx fixed assets, 1xxx current assets, 2xxx
# liabilities, 3xxx capital, 4xxx sales, 5xxx purchases, 7xxx
# overheads, 8xxx depreciation/sundries. Each row is tagged to its
# SI 2008/410 Sch 1 Format 1 statutory line via statutory_account_code
# (P&L lines by number, balance-sheet headings by letter).
#
# Tax-code defaults reference the codes seeded in tax_codes.yaml.
# Payroll-control accounts (2210/2220/2230, 7000/7006/7007) are the
# accounts jurisdictions/uk/__init__.py's PAYROLL_POSTING profile maps
# the neutral payroll roles onto.
