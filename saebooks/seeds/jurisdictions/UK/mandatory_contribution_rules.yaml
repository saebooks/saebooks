# United Kingdom workplace-pension automatic enrolment — statutory
# minimum contributions (Pensions Act 2008), tax year 2026-27.
# jurisdiction = 'GBR'. Mirrors AU's au_super_guarantee shape.
#
# Statutory minimum: 8% of QUALIFYING EARNINGS in total, of which the
# EMPLOYER must pay at least 3% — the employee (with basic-rate tax
# relief) makes up the remainder, conventionally quoted as 5%.
#
# Qualifying-earnings band 2026-27: £6,240 (lower) to £50,270 (upper);
# earnings TRIGGER for automatic enrolment: £10,000/yr (age 22 to
# State Pension age). The band lower bound and the trigger have no
# column on mandatory_contribution_rules — the band upper bound rides
# in cap_amount; the full parameter set (trigger, band lower, deferral
# windows, re-enrolment cycle) lives in pension_auto_enrolment.yaml
# (reference_seed: false) beside this file, which
# jurisdictions/uk/payroll.py consumes.
#
# Values: strategy §5.1 (verified 2026-07-12) — the DWP freezes/reviews
# these annually; band figures track the NI LEL/UEL.
table: mandatory_contribution_rules
key: [jurisdiction, code, effective_from]
rows:
  - jurisdiction: GBR
    code: uk_auto_enrolment_employer_min
    payer: employer
    rate_percent: 3.0000
    earnings_base: qualifying_earnings_band
    cap_amount: 50270.00
    effective_from: 2026-04-06

  - jurisdiction: GBR
    code: uk_auto_enrolment_employee_min
    payer: employee
    rate_percent: 5.0000
    earnings_base: qualifying_earnings_band
    cap_amount: 50270.00
    effective_from: 2026-04-06
