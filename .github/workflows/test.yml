# SAE Books — CI test / lint / type / migration gate
#
# This is the correctness gate (separate from build-images.yml, which only
# proves the Docker image builds). It runs on GitHub-hosted ubuntu-latest
# runners, which are free for public repositories.
#
# BLOCKING jobs (a red here must block a merge):
#   * lint        — ruff check . (whole repo, config in pyproject.toml)
#   * typecheck   — mypy --strict on the core domain-model + config layer
#                   (saebooks/models + config.py + db_types.py + web.py).
#                   Generated gRPC stubs (saebooks/grpc_gen), the optional
#                   MCP server (saebooks/mcp) and the heavily-decorated
#                   API/service layers are NOT yet strict-clean and are
#                   tracked as a follow-up — see typecheck job notes below.
#   * migrations  — alembic upgrade head on a fresh Postgres 16, proving the
#                   whole 0001..head chain applies from empty.
#
#   * tests       — full pytest suite via the isolated docker-compose stack.
#                   BLOCKING as of 2026-06-05: the suite is GREEN (full suite
#                   plus 3 fresh-DB reruns of the previously-flaky clusters all
#                   exit 0). The two long-standing harness deselects stay
#                   excluded (see tests/KNOWN_FAILURES.txt). The db healthcheck
#                   probes TCP (-h 127.0.0.1) to close the postgres first-init
#                   race; the run step retries once for residual infra blips.

name: CI gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff) — BLOCKING
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: ruff check (whole repo, pyproject config)
        # Pinned to the version in uv.lock so CI matches local dev exactly.
        run: uvx ruff@0.15.11 check .

  conformance:
    name: conformance (ATO generators, offline) — BLOCKING
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python + project deps
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: tests_conformance (pure — no DB stack, no network)
        # The DSP-distributed ATO packs are NOT in the repo, so the
        # official-scenario round-trips and EVTE keystore tests skip here
        # (-rs makes every skip visible); the committed TPAR BDE golden
        # files run unconditionally and pin the FPAIVV03.0 output
        # byte-for-byte. Full coverage = `make conformance` on a dev host
        # with SBR_CONFORMANCE_DIR pointing at the packs.
        run: |
          SAEBOOKS_ENV=test uv run pytest tests_conformance/ -rs

  typecheck:
    name: typecheck (mypy --strict, core) — BLOCKING
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python + project deps
        # mypy --strict needs the real dependency types (sqlalchemy,
        # pydantic, fastapi) installed, or it floods with import-not-found.
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: mypy --strict (core domain-model + config layer)
        # Scope = the green-or-near-green core. The wider api/service/mcp
        # layers carry ~840 strict findings (mostly untyped connecpy/grpc
        # decorators + Any-returns) and are excluded until triaged; widening
        # this scope is the follow-up. Generated code is excluded in
        # pyproject [tool.mypy].
        run: |
          uv run mypy saebooks/models saebooks/config.py saebooks/db_types.py saebooks/web.py

  migrations:
    name: migrations (alembic upgrade head) — BLOCKING
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saebooks_test
          POSTGRES_PASSWORD: saebooks_test_pw
          POSTGRES_DB: saebooks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saebooks_test -d saebooks_test"
          --health-interval 3s --health-timeout 3s --health-retries 30
    env:
      # asyncpg URL the alembic env.py reads via saebooks.config.settings.
      DATABASE_URL: "postgresql+asyncpg://saebooks_test:saebooks_test_pw@localhost:5432/saebooks_test"
      SAEBOOKS_ENV: "test"
      # Migration 0087 creates the saebooks_sql_ro role with a password;
      # 0128 ALTERs the saebooks_app role password — both read from env.
      SAEBOOKS_SQL_RO_PASSWORD: "saebooks_sql_ro_test_pw"
      SAEBOOKS_APP_DB_PASSWORD: "saebooks_app_test_pw"
      # Encrypted-field key so config import does not raise.
      SAEBOOKS_FIELD_ENCRYPTION_KEY: "c2FlYm9va3MtdGVzdC1rZXktZG8tbm90LXVzZS1wcm8="
      SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python + project deps
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Bootstrap migration-owner roles
        # Migrations reference the saebooks / saebooks_app roles by name
        # (the docker test stack seeds them via docker/test-initdb). Replay
        # that exact SQL against the service Postgres with psql
        # (postgresql-client is preinstalled on ubuntu-latest). Using the
        # committed init script avoids duplicating the role definitions.
        env:
          PGPASSWORD: saebooks_test_pw
        run: |
          psql -h localhost -p 5432 -U saebooks_test -d saebooks_test \
            -v ON_ERROR_STOP=1 -f docker/test-initdb/01-test-roles.sql
      - name: alembic upgrade head (fresh DB, full 0001..head chain)
        run: uv run alembic upgrade head

  tests:
    name: tests (pytest, full suite) — BLOCKING
    runs-on: ubuntu-latest
    # The full pytest suite runs in the isolated docker-compose stack and is
    # now GREEN (verified 2026-06-05: the full suite + 3 fresh-DB reruns of the
    # previously-flaky journal/projects/tpar/void clusters all exit 0). This job
    # is BLOCKING — a red here stops the merge, same as lint/typecheck/migrations.
    # The two long-standing harness deselects (adapter_registry, m0_synthetic_nz)
    # stay excluded in docker-compose.test.yml; see tests/KNOWN_FAILURES.txt.
    # To revert to non-blocking, re-add `continue-on-error: true` below.
    steps:
      - uses: actions/checkout@v4
      - name: Run the isolated test stack (retry once on infra flake)
        # scripts/run-tests.sh builds Dockerfile.test (gRPC stubs + dev deps),
        # runs alembic upgrade head, then pytest against an ephemeral
        # postgres:16-alpine, tearing everything down afterwards. The db
        # healthcheck now probes -h 127.0.0.1 to close the postgres first-init
        # TCP race; the single retry here is belt-and-suspenders for any
        # residual infra blip. A genuine test failure fails BOTH attempts and
        # blocks the merge — the retry cannot mask a real red.
        run: |
          ./scripts/run-tests.sh || {
            echo "::warning::isolated test stack failed once — retrying once (covers postgres first-init race / infra blip)";
            ./scripts/run-tests.sh;
          }
