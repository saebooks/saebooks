name: saebooks-mcp

services:
  mcp:
    build:
      # Build context is the repo root because the standalone MCP
      # installs the saebooks package (one source of truth with the
      # in-tree mount at /mcp). Dockerfile sits in mcp/.
      context: ..
      dockerfile: mcp/Dockerfile
    image: saebooks-mcp:latest
    container_name: saebooks-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:18314:8000"
    environment:
      # Point at wherever your saebooks API is reachable.
      SAEBOOKS_API_URL: http://saebooks-api:8000
      SAEBOOKS_MCP_TRANSPORT: sse
      SAEBOOKS_MCP_LOG_LEVEL: INFO
      # Supply a saebk_* API token (issued at /admin/api-tokens). Read from
      # a gitignored .env file in this dir, or forwarded per-session via the
      # MCP transport Authorization header.
      SAEBOOKS_API_TOKEN: ${SAEBOOKS_API_TOKEN:-}
    networks:
      - saebooks
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/sse', timeout=2).status < 500 else 1)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  # Attach the MCP container to the same network as your saebooks API.
  # Replace with your API stack's network (external) or define one here.
  saebooks:
    external: true
    name: saebooks_default
