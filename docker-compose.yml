services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saebooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-saebooks}
    volumes:
      - saebooks_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./saebooks:/app/saebooks
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      # Backup directory mounted read-only so /admin/backups can list
      # dumps + parse the status log. The host path is whatever pg_dump
      # writes to (defaults to $HOME/saebooks-backups in scripts/backup.sh).
      - ${SAEBOOKS_BACKUP_DIR:-/home/sauer/saebooks-backups}:/app/backups:ro
    environment:
      SAEBOOKS_BACKUP_DIR_IN_CONTAINER: /app/backups
    ports:
      - "8042:8000"
    networks:
      - default
      - revproxy

  # Second app instance pinned to the MYOB Classic theme, sharing the
  # same database + codebase as ``app``. Lets the two themes be
  # compared side-by-side at books.sauer.com.au (default) vs
  # books-classic.sauer.com.au (classic) without restarting the main
  # app. The env var ``SAEBOOKS_FRONTEND=classic`` swaps the Jinja
  # ChoiceLoader at boot (see services/theme.py → validate_startup_theme).
  # No host port is published — Caddy reaches it over the revproxy
  # network by compose name (``saebooks-classic-1:8000``).
  classic:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./saebooks:/app/saebooks
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ${SAEBOOKS_BACKUP_DIR:-/home/sauer/saebooks-backups}:/app/backups:ro
    environment:
      SAEBOOKS_BACKUP_DIR_IN_CONTAINER: /app/backups
      SAEBOOKS_FRONTEND: classic
    networks:
      - default
      - revproxy

  # Cloud theme (QuickBooks-Online-inspired). Reached by Caddy as
  # saebooks-cloud-1:8000 — no host port published.
  cloud:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./saebooks:/app/saebooks
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ${SAEBOOKS_BACKUP_DIR:-/home/sauer/saebooks-backups}:/app/backups:ro
    environment:
      SAEBOOKS_BACKUP_DIR_IN_CONTAINER: /app/backups
      SAEBOOKS_FRONTEND: cloud
    networks:
      - default
      - revproxy

  # Dense theme (information-dense power-user layout). Reached by Caddy
  # as saebooks-dense-1:8000.
  dense:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./saebooks:/app/saebooks
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ${SAEBOOKS_BACKUP_DIR:-/home/sauer/saebooks-backups}:/app/backups:ro
    environment:
      SAEBOOKS_BACKUP_DIR_IN_CONTAINER: /app/backups
      SAEBOOKS_FRONTEND: dense
    networks:
      - default
      - revproxy

networks:
  # 'default' stays on the compose-managed bridge so app↔db keeps
  # working; revproxy is the external shared network Caddy + Authentik
  # use so books.sauer.com.au can forward-auth to authentik-server and
  # reverse-proxy to this container by its compose name.
  default:
  revproxy:
    external: true

volumes:
  saebooks_db:
