services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saebooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-saebooks}
    volumes:
      - saebooks_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./saebooks:/app/saebooks
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    ports:
      - "127.0.0.1:8042:8000"

volumes:
  saebooks_db:
